openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Kailali-4 Connect - MP Office Digital Governance Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: complaints
    description: Citizen complaints
  - name: ideas
    description: Community ideas
  - name: news
    description: Official news and updates
  - name: dashboard
    description: Dashboard statistics and summaries
  - name: team
    description: Team member registry
  - name: settings
    description: Site settings and configuration
  - name: citizens
    description: Citizen authentication and account management
  - name: team-applications
    description: Citizen team membership applications
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /complaints:
    get:
      operationId: listComplaints
      tags: [complaints]
      summary: List all complaints
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, resolved]
        - name: ward
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
    post:
      operationId: createComplaint
      tags: [complaints]
      summary: Submit a new complaint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintBody"
      responses:
        "201":
          description: Complaint created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /complaints/{id}:
    get:
      operationId: getComplaint
      tags: [complaints]
      summary: Get a complaint by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Complaint details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"
    delete:
      operationId: deleteComplaint
      tags: [complaints]
      summary: Delete a complaint
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllResult"
        "404":
          description: Not found
    patch:
      operationId: updateComplaintStatus
      tags: [complaints]
      summary: Update complaint status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateComplaintStatusBody"
      responses:
        "200":
          description: Updated complaint
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /ideas:
    get:
      operationId: listIdeas
      tags: [ideas]
      summary: List community ideas
      responses:
        "200":
          description: List of ideas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Idea"
    post:
      operationId: createIdea
      tags: [ideas]
      summary: Submit a new idea
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIdeaBody"
      responses:
        "201":
          description: Idea created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /ideas/{id}/upvote:
    post:
      operationId: upvoteIdea
      tags: [ideas]
      summary: Upvote an idea
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Idea"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List official news updates
      responses:
        "200":
          description: List of news items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
    post:
      operationId: createNews
      tags: [news]
      summary: Create a news update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsBody"
      responses:
        "201":
          description: News item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get complaint statistics summary
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/ward-breakdown:
    get:
      operationId: getWardBreakdown
      tags: [dashboard]
      summary: Get complaint counts grouped by ward
      responses:
        "200":
          description: Ward breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WardStat"

  /settings/social-links:
    get:
      operationId: getSocialLinks
      tags: [settings]
      summary: Get social media links
      responses:
        "200":
          description: Social links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialLinks"
    patch:
      operationId: updateSocialLinks
      tags: [settings]
      summary: Update social media links
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialLinks"
      responses:
        "200":
          description: Updated social links
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SocialLinks"

  /settings/home-content:
    get:
      operationId: getHomeContent
      tags: [settings]
      summary: Get home page content settings
      responses:
        "200":
          description: Home content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeContent"
    patch:
      operationId: updateHomeContent
      tags: [settings]
      summary: Update home page content settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HomeContent"
      responses:
        "200":
          description: Updated home content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeContent"

  /settings/mp-profile:
    get:
      operationId: getMpProfile
      tags: [settings]
      summary: Get MP profile settings
      responses:
        "200":
          description: MP profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpProfile"
    patch:
      operationId: updateMpProfile
      tags: [settings]
      summary: Update MP profile settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpProfile"
      responses:
        "200":
          description: Updated MP profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MpProfile"

  /team:
    get:
      operationId: listTeamMembers
      tags: [team]
      summary: List all team members
      parameters:
        - name: palika
          in: query
          schema:
            type: string
        - name: rank
          in: query
          schema:
            type: string
            enum: [volunteer, coordinator, leader]
      responses:
        "200":
          description: List of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamMember"
    post:
      operationId: joinTeam
      tags: [team]
      summary: Register a new team member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinTeamBody"
      responses:
        "201":
          description: Team member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /team/all:
    delete:
      operationId: deleteAllTeamMembers
      tags: [team]
      summary: Delete all team members
      responses:
        "200":
          description: All team members deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllResult"

  /complaints/all:
    delete:
      operationId: deleteAllComplaints
      tags: [complaints]
      summary: Delete all complaints
      responses:
        "200":
          description: All complaints deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllResult"

  /team/{id}:
    patch:
      operationId: editTeamMember
      tags: [team]
      summary: Edit a team member's details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditTeamMemberBody"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "404":
          description: Not found
    delete:
      operationId: deleteTeamMember
      tags: [team]
      summary: Delete a team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllResult"
        "404":
          description: Not found

  /team/{id}/rank:
    patch:
      operationId: updateTeamRank
      tags: [team]
      summary: Update a team member's rank
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRankBody"
      responses:
        "200":
          description: Rank updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"
        "404":
          description: Member not found

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /citizens/signup:
    post:
      operationId: citizenSignup
      tags: [citizens]
      summary: Register a new citizen account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitizenSignupBody"
      responses:
        "201":
          description: Citizen registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenAuthResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /citizens/login:
    post:
      operationId: citizenLogin
      tags: [citizens]
      summary: Login as a citizen
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CitizenLoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenAuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /citizens/me:
    get:
      operationId: getCitizenMe
      tags: [citizens]
      summary: Get current citizen profile (requires Bearer token)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Citizen profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenProfile"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /citizens/complaints:
    get:
      operationId: getCitizenComplaints
      tags: [citizens]
      summary: Get complaints submitted by the logged-in citizen
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Citizen complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /team-applications:
    get:
      operationId: listTeamApplications
      tags: [team-applications]
      summary: List team applications (admin) or own application (citizen)
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamApplication"
    post:
      operationId: createTeamApplication
      tags: [team-applications]
      summary: Submit a team membership application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamApplicationBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamApplication"

  /team-applications/{id}:
    patch:
      operationId: updateTeamApplicationStatus
      tags: [team-applications]
      summary: Approve or reject a team application (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamApplicationStatusBody"
      responses:
        "200":
          description: Application updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamApplication"
        "404":
          description: Application not found
    delete:
      operationId: deleteTeamApplication
      tags: [team-applications]
      summary: Delete a team application (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Application deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteAllResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Complaint:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        palika:
          type: string
        ward:
          type: integer
        category:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in_progress, resolved]
        createdAt:
          type: string
          format: date-time
        citizenId:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - palika
        - ward
        - category
        - description
        - status
        - createdAt
        - updatedAt

    CreateComplaintBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        palika:
          type: string
        ward:
          type: integer
        category:
          type: string
        description:
          type: string
      required:
        - name
        - palika
        - ward
        - category
        - description

    UpdateComplaintStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, in_progress, resolved]
      required:
        - status

    Idea:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        submittedBy:
          type: string
        ward:
          type: integer
        upvotes:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - description
        - submittedBy
        - ward
        - upvotes
        - createdAt

    CreateIdeaBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        submittedBy:
          type: string
        ward:
          type: integer
      required:
        - title
        - description
        - submittedBy
        - ward

    NewsItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
        publishedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - category
        - publishedAt

    CreateNewsBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        category:
          type: string
      required:
        - title
        - content
        - category

    DashboardStats:
      type: object
      properties:
        total:
          type: integer
        pending:
          type: integer
        inProgress:
          type: integer
        resolved:
          type: integer
        totalIdeas:
          type: integer
        totalNews:
          type: integer
      required:
        - total
        - pending
        - inProgress
        - resolved
        - totalIdeas
        - totalNews

    WardStat:
      type: object
      properties:
        ward:
          type: integer
        total:
          type: integer
        resolved:
          type: integer
      required:
        - ward
        - total
        - resolved

    SocialLinks:
      type: object
      properties:
        facebook:
          type: string
          nullable: true
        youtube:
          type: string
          nullable: true
        website:
          type: string
          nullable: true

    HomeContent:
      type: object
      properties:
        welcome:
          type: string
        footer:
          type: string
      required:
        - welcome
        - footer

    EditTeamMemberBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        palika:
          type: string
        ward:
          type: integer
        rank:
          type: string
          enum: [volunteer, coordinator, leader]

    MpProfile:
      type: object
      properties:
        name:
          type: string
        message:
          type: string
        photoUrl:
          type: string
      required:
        - name
        - message

    DeleteAllResult:
      type: object
      properties:
        deleted:
          type: integer
      required:
        - deleted

    TeamMember:
      type: object
      properties:
        id:
          type: integer
        cid:
          type: string
        name:
          type: string
        phone:
          type: string
        palika:
          type: string
        ward:
          type: integer
        photoUrl:
          type: string
        rank:
          type: string
          enum: [volunteer, coordinator, leader]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - cid
        - name
        - palika
        - ward
        - rank
        - createdAt

    JoinTeamBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        palika:
          type: string
        ward:
          type: integer
        photoUrl:
          type: string
      required:
        - name
        - palika
        - ward

    UpdateRankBody:
      type: object
      properties:
        rank:
          type: string
          enum: [volunteer, coordinator, leader]
      required:
        - rank

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [complaint, idea, news]
        title:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time
      required:
        - id
        - type
        - title
        - description
        - timestamp

    CitizenSignupBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
        ward:
          type: integer
        palika:
          type: string
      required:
        - name
        - phone
        - email
        - password
        - ward
        - palika

    CitizenLoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    CitizenProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        ward:
          type: integer
        palika:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - email
        - ward
        - palika
        - createdAt

    CitizenAuthResponse:
      type: object
      properties:
        token:
          type: string
        citizen:
          $ref: "#/components/schemas/CitizenProfile"
      required:
        - token
        - citizen

    TeamApplication:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        ward:
          type: integer
        palika:
          type: string
        skills:
          type: string
        message:
          type: string
          nullable: true
        citizenId:
          type: integer
          nullable: true
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - phone
        - ward
        - palika
        - skills
        - status
        - createdAt

    CreateTeamApplicationBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        ward:
          type: integer
        palika:
          type: string
        skills:
          type: string
        message:
          type: string
      required:
        - name
        - phone
        - ward
        - palika
        - skills

    UpdateTeamApplicationStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, approved, rejected]
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
