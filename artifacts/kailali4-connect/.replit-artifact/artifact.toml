kind = "web"
previewPath = "/"
title = "Kailali-4 Connect"
version = "1.0.0"
id = "artifacts/kailali4-connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20350

[services.development]
run = "pnpm --filter @workspace/kailali4-connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kailali4-connect", "run", "build" ]
publicDir = "artifacts/kailali4-connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20350"
BASE_PATH = "/"
